.welcome-card:active{transform:scale(0.97);background:rgba(255,255,255,0.1)}

.welcome-card .name{font-size:18px;font-weight:700;margin-bottom:4px}

.card-wrapper.flipped{cursor:default}

.card{aspect-ratio:2/3;border-radius:12px;overflow:hidden;position:relative;box-shadow:0 8px 32px rgba(0,0,0,0.3)}

  {id:'p1',name:'Ace of Pentacles',cn:'星币一',symbol:'??',upright:'创造、开始、灵感、新机会',reversed:'延迟、缺乏动力、计划流产'},
  {id:'p2',name:'Two of Pentacles',cn:'星币二',symbol:'??',upright:'平衡、合作、选择、关系',reversed:'不和谐、分离、犹豫'},
  {id:'p3',name:'Three of Pentacles',cn:'星币三',symbol:'??',upright:'成长、扩张、团队、准备',reversed:'障碍、冲突、延迟'},
  {id:'p4',name:'Four of Pentacles',cn:'星币四',symbol:'??',upright:'稳定、基础、庆祝、休息',reversed:'不稳定、冲突、不满'},
  {id:'p5',name:'Five of Pentacles',cn:'星币五',symbol:'??',upright:'冲突、竞争、挑战、失落',reversed:'和解、修复、妥协'},
  {id:'p6',name:'Six of Pentacles',cn:'星币六',symbol:'??',upright:'和谐、成功、进步、分享',reversed:'骄傲、延迟、不公'},
  {id:'p7',name:'Seven of Pentacles',cn:'星币七',symbol:'??',upright:'挑战、策略、评估、坚持',reversed:'困惑、放弃、过度思考'},
  {id:'p8',name:'Eight of Pentacles',cn:'星币八',symbol:'??',upright:'行动、进展、速度、力量',reversed:'停滞、缓慢、失去动力'},
  {id:'p9',name:'Nine of Pentacles',cn:'星币九',symbol:'??',upright:'成就、满足、努力、坚韧',reversed:'过度、压力、不满足'},
  {id:'p10',name:'Ten of Pentacles',cn:'星币十',symbol:'??',upright:'完成、负担、结束、过度',reversed:'衰落、崩塌、损失'},
  {id:'p11',name:'Page of Pentacles',cn:'星币侍从',symbol:'??',upright:'探索、学习、消息、开始',reversed:'拖延、缺乏经验、坏消息'},
  {id:'p12',name:'Knight of Pentacles',cn:'星币骑士',symbol:'??',upright:'行动、追求、冒险、热情',reversed:'冲动、嫉妒、鲁莽'},
  {id:'p13',name:'Queen of Pentacles',cn:'星币王后',symbol:'??',upright:'成熟、关怀、创造、领导',reversed:'依赖、苛求、不安全感'},
  {id:'p14',name:'King of Pentacles',cn:'星币国王',symbol:'??',upright:'权威、掌控、成就、稳定',reversed:'专制、固执、滥用权力'},
];

const SPREADS=[
  {id:'single',name:'单张牌',icon:'??',desc:'最简单的方式，一张牌快速了解当下运势',count:1},
  {id:'three-card',name:'三牌阵',icon:'??',desc:'经典三牌阵，代表过去、现在、未来',count:3},
  {id:'celtic-cross',name:'凯尔特十字',icon:'??',desc:'复杂强大的牌阵，深入分析问题各个方面',count:10}
];
const DIRECTIONS=[
  {id:'love',name:'爱情',icon:'??'},{id:'career',name:'事业',icon:'??'},
  {id:'health',name:'健康',icon:'??'},{id:'wealth',name:'财运',icon:'??'},
  {id:'relationship',name:'感情发展',icon:'??'},{id:'study',name:'学业',icon:'??'},
  {id:'social',name:'人缘',icon:'??'},{id:'general',name:'综合运势',icon:'??'}
];
let state={spread:null,direction:null,cards:[],flipped:new Set(),revealed:false};
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function drawCards(n){const s=shuffle(TAROT_CARDS);return s.slice(0,n).map(c=>({...c,reversed:Math.random()>0.5}))}
function updateSteps(p){const m={welcome:0,direction:1,drawing:2};const i=m[p]||0;for(let j=1;j<=3;j++){document.getElementById('step'+j).className='step'+(j<=i+1?' active':'')}}
function goToPage(p){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById('page-'+p).classList.add('active');updateSteps(p)}
function init(){
  SPREADS.forEach((s,i)=>{
    const d=document.createElement('div');d.className='welcome-card';
    d.style.animationDelay=(i*0.1)+'s';
    d.innerHTML='<div class="icon">'+s.icon+'</div><div class="name">'+s.name+'</div><div class="desc">'+s.desc+'</div><div class="count">'+s.count+' 张牌</div>';
    d.onclick=()=>selectSpread(s);document.getElementById('spread-selection').appendChild(d);
  });
  const dc=document.getElementById('direction-list');
  DIRECTIONS.forEach((d,i)=>{
    const div=document.createElement('div');div.className='spread-item';
    div.innerHTML='<div class="icon">'+d.icon+'</div><div class="info"><div class="name">'+d.name+'</div></div>';
    div.onclick=()=>selectDirection(d);dc.appendChild(div);
  });
  renderCards();
}
function selectSpread(s){state.spread=s;state.revealed=false;document.getElementById('selected-spread-name').textContent=s.name;goToPage('direction')}
function selectDirection(d){state.direction=d;state.cards=drawCards(state.spread.count);state.flipped=new Set();state.revealed=false;goToPage('drawing');renderCards()}
function renderCards(){
  const container=document.getElementById('cards-container');container.innerHTML='';
  const count=state.cards.length;let gc='single';if(count===3)gc='three';else if(count===10)gc='celtic';
  const grid=document.createElement('div');grid.className='cards-grid '+gc;
  state.cards.forEach((card,i)=>{
    const w=document.createElement('div');w.className='card-wrapper'+(state.flipped.has(i)?' flipped':'');
    w.onclick=()=>flipCard(i);
    const cd=document.createElement('div');cd.className='card';
    if(state.flipped.has(i)||state.revealed){
      cd.innerHTML='<div class="card-face"><div class="symbol">'+card.symbol+'</div><div class="cn-name">'+card.cn+'</div><div class="en-name">'+card.name+'</div>'+(card.reversed?'<div class="reversed-tag">逆位</div>':'')+'</div>';
    }else{
      cd.innerHTML='<div class="card-back"><div class="pattern"><div class="star">?</div></div></div>';
    }
    w.appendChild(cd);grid.appendChild(w);
  });
  container.appendChild(grid);
  document.getElementById('max-count').textContent=count;
  document.getElementById('selected-count').textContent=state.flipped.size;
  document.getElementById('drawing-actions').style.display=(state.flipped.size>=count||state.revealed)?'flex':'none';
}
function flipCard(i){if(state.revealed)return;state.flipped.add(i);renderCards()}
function reshuffle(){state.cards=drawCards(state.spread.count);state.flipped=new Set();state.revealed=false;renderCards()}
function revealAll(){state.revealed=true;renderCards();setTimeout(showResult,600)}
function showResult(){
  const overlay=document.getElementById('result-overlay');
  const container=document.getElementById('result-cards');container.innerHTML='';
  const positions=['核心','过去','现在','未来','上方','下方','建议','环境','希望','结果'];
  const pos3=['过去','现在','未来'];
  state.cards.forEach((card,i)=>{
    const pos=state.cards.length===10?(positions[i]||'位置'+(i+1)):state.cards.length===3?(pos3[i]||'位置'+(i+1)):'核心';
    const meaning=card.reversed?card.reversed:card.upright;
    const div=document.createElement('div');div.className='result-card';
    div.innerHTML='<div class="pos">'+pos+'</div><div class="cname">'+card.symbol+' '+card.cn+' <span class="rev">'+(card.reversed?'(逆位)':'(正位)')+'</span></div><div class="meaning">'+meaning+'</div>';
    container.appendChild(div);
  });
  overlay.classList.add('active');
}
function closeResult(e){if(e&&e.target!==e.currentTarget)return;document.getElementById('result-overlay').classList.remove('active')}
function shareResult(){
  const text='?? 塔罗占卜结果\n牌阵：'+state.spread.name+'\n方向：'+state.direction.name+'\n'+state.cards.map((c,i)=>'? '+c.symbol+' '+c.cn+(c.reversed?'(逆位)':'(正位)')).join('\n');
  if(navigator.share){navigator.share({title:'塔罗占卜结果',text:text}).catch(()=>{})}
  else{navigator.clipboard.writeText(text).then(()=>{showToast('结果已复制到剪贴板，可分享到QQ')}).catch(()=>{showToast('请截图保存结果')})}
}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
init();
</script>
